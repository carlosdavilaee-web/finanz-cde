<style>
/* ============================================================
   VARIABLES DE DISEÑO
   ============================================================ */
:root {
  --bg: #0e0f10;
  --bg-elev: #16181a;
  --bg-elev-2: #1d1f22;
  --border: #262a2e;
  --border-strong: #363b40;
  --text: #e8e6e3;
  --text-dim: #a1a09a;
  --text-faint: #6b6a66;
  --accent: #d4a574;
  --accent-dim: #8a6a4a;
  --positive: #8fb573;
  --negative: #d48170;
  --warn: #d4a574;
  --info: #7aa5c4;
  --purple: #a48fc4;

  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter Tight', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --radius: 4px;
  --radius-lg: 8px;
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 40px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg); color: var(--text);
  font-family: var(--font-body); font-size: 14px; line-height: 1.5;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

body { background: radial-gradient(ellipse at top, rgba(212, 165, 116, 0.04) 0%, transparent 50%), var(--bg); }

button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

input, select, textarea {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px; color: var(--text);
  outline: none; transition: border-color 0.15s; width: 100%;
}

input:focus, select:focus, textarea:focus { border-color: var(--accent-dim); }

button {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 14px;
  cursor: pointer; transition: all 0.15s; color: var(--text);
}

button:hover { border-color: var(--border-strong); background: var(--bg-elev-2); }
button.primary { background: var(--accent); color: #1a1410; border-color: var(--accent); font-weight: 600; }
button.primary:hover { background: #e0b488; }
button.danger { color: var(--negative); }
button.danger:hover { border-color: var(--negative); }
button.ghost { background: transparent; border-color: transparent; }
button.ghost:hover { background: var(--bg-elev); }
button.sm { padding: 4px 10px; font-size: 12px; }

.app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

.sidebar {
  background: var(--bg-elev); border-right: 1px solid var(--border);
  padding: var(--space-lg) var(--space-md);
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}

.logo {
  font-family: var(--font-display); font-size: 22px; font-weight: 600;
  letter-spacing: -0.02em; margin-bottom: var(--space-xl);
  padding: 0 var(--space-sm); font-style: italic;
}

.logo span { color: var(--accent); font-style: normal; }

.nav { display: flex; flex-direction: column; gap: 2px; }

.nav-item {
  background: transparent; border: none; text-align: left;
  padding: 10px 12px; border-radius: var(--radius); color: var(--text-dim);
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; transition: all 0.15s;
}

.nav-item:hover { background: var(--bg-elev-2); color: var(--text); }
.nav-item.active { background: var(--bg-elev-2); color: var(--text); font-weight: 500; }
.nav-item.active::before { content: ''; width: 2px; height: 14px; background: var(--accent); margin-right: -4px; }

.nav-section {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-faint); padding: var(--space-md) var(--space-sm) 4px;
  font-weight: 600;
}

.main { padding: var(--space-xl); max-width: 1400px; }

.page-header {
  margin-bottom: var(--space-xl);
  display: flex; justify-content: space-between; align-items: flex-end;
  gap: var(--space-md); flex-wrap: wrap;
}

.page-title {
  font-family: var(--font-display); font-size: 36px; font-weight: 500;
  letter-spacing: -0.025em; line-height: 1;
}

.page-subtitle { color: var(--text-dim); margin-top: 6px; font-size: 13px; }
.accent-rule { width: 40px; height: 2px; background: var(--accent); margin-top: var(--space-md); }

.card {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: var(--space-lg);
}

.card-title {
  font-family: var(--font-display); font-size: 16px; font-weight: 500;
  margin-bottom: var(--space-md);
  display: flex; justify-content: space-between; align-items: center; gap: var(--space-sm);
}

.card-subtitle { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

.stat { display: flex; flex-direction: column; gap: 4px; }
.stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); font-weight: 500; }
.stat-value { font-family: var(--font-mono); font-size: 24px; font-weight: 500; letter-spacing: -0.02em; }
.stat-value.big { font-family: var(--font-display); font-size: 48px; font-weight: 500; letter-spacing: -0.03em; }
.stat-value.positive { color: var(--positive); }
.stat-value.negative { color: var(--negative); }
.stat-value.accent { color: var(--accent); }
.stat-value.warn { color: var(--warn); }
.stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.grid { display: grid; gap: var(--space-md); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-5 { grid-template-columns: repeat(5, 1fr); }

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .nav { flex-direction: row; overflow-x: auto; flex-wrap: wrap; }
  .nav-section { width: 100%; }
  .main { padding: var(--space-md); }
  .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
  .page-title { font-size: 28px; }
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); font-weight: 500; border-bottom: 1px solid var(--border); }
td { padding: 12px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-elev-2); }
td.mono { font-family: var(--font-mono); }
td.num { text-align: right; font-family: var(--font-mono); }
th.num { text-align: right; }

.tag {
  display: inline-flex; padding: 2px 8px; font-size: 11px;
  border-radius: 3px; background: var(--bg-elev-2); color: var(--text-dim);
  border: 1px solid var(--border); font-weight: 500;
}
.tag.positive { color: var(--positive); border-color: rgba(143, 181, 115, 0.3); background: rgba(143, 181, 115, 0.08); }
.tag.negative { color: var(--negative); border-color: rgba(212, 129, 112, 0.3); background: rgba(212, 129, 112, 0.08); }
.tag.warn { color: var(--warn); border-color: rgba(212, 165, 116, 0.3); background: rgba(212, 165, 116, 0.08); }
.tag.info { color: var(--info); border-color: rgba(122, 165, 196, 0.3); background: rgba(122, 165, 196, 0.08); }
.tag.purple { color: var(--purple); border-color: rgba(164, 143, 196, 0.3); background: rgba(164, 143, 196, 0.08); }

.progress { width: 100%; height: 6px; background: var(--bg-elev-2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; }
.progress-bar.high { background: var(--negative); }
.progress-bar.med { background: var(--warn); }
.progress-bar.low { background: var(--positive); }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: var(--space-md);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-elev); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: var(--space-lg);
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
}
.modal-title { font-family: var(--font-display); font-size: 20px; font-weight: 500; margin-bottom: var(--space-md); }

.form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: var(--space-md); }
.form-row label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-faint); font-weight: 500; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md); }
.modal-actions { display: flex; justify-content: flex-end; gap: var(--space-sm); margin-top: var(--space-lg); }

.row { display: flex; align-items: center; gap: var(--space-sm); }
.row-between { display: flex; justify-content: space-between; align-items: center; gap: var(--space-sm); }
.stack { display: flex; flex-direction: column; gap: var(--space-md); }
.stack-sm { display: flex; flex-direction: column; gap: var(--space-sm); }
.divider { height: 1px; background: var(--border); margin: var(--space-md) 0; }
.hidden { display: none !important; }
.empty { padding: var(--space-xl); text-align: center; color: var(--text-faint); font-size: 13px; }

.alert {
  background: rgba(212, 165, 116, 0.08);
  border: 1px solid rgba(212, 165, 116, 0.3);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 13px; color: var(--warn);
  display: flex; gap: var(--space-sm); align-items: flex-start;
}
.alert.danger { background: rgba(212, 129, 112, 0.08); border-color: rgba(212, 129, 112, 0.3); color: var(--negative); }
.alert.info { background: rgba(122, 165, 196, 0.08); border-color: rgba(122, 165, 196, 0.3); color: var(--info); }
.alert.success { background: rgba(143, 181, 115, 0.08); border-color: rgba(143, 181, 115, 0.3); color: var(--positive); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

.insight-card {
  background: linear-gradient(135deg, rgba(212, 165, 116, 0.06), rgba(212, 165, 116, 0.01));
  border: 1px solid rgba(212, 165, 116, 0.2);
  border-radius: var(--radius-lg); padding: var(--space-lg);
}
.insight-title {
  font-family: var(--font-display); font-size: 14px; font-weight: 500;
  color: var(--accent); margin-bottom: var(--space-sm);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.insight-body { color: var(--text); font-size: 13px; line-height: 1.6; }
.insight-body strong { color: var(--accent); font-weight: 600; }

.week-card {
  background: var(--bg-elev-2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: var(--space-md);
}
.week-header {
  font-family: var(--font-display); font-size: 15px; font-weight: 500;
  margin-bottom: var(--space-sm);
  display: flex; justify-content: space-between; align-items: center;
}
.week-items { font-size: 12px; color: var(--text-dim); }
.week-items li { padding: 2px 0; list-style: none; }
.week-items li strong { color: var(--text); }
</style>

<script>
/* ============================================================
   UTILIDADES DE FECHA — CENTRALIZADAS, SIN BUG DE ZONA HORARIA
   ============================================================
   REGLA: nunca usar new Date('YYYY-MM-DD') porque JS lo parsea como UTC
   y en México (UTC-6) eso produce la fecha del día anterior a las 18:00.
   Usar SIEMPRE parseLocalDate y toLocalISO.
   ============================================================ */

// "2026-04-17" -> Date objeto en zona local, 2026-04-17 00:00:00 hora local
function parseLocalDate(str) {
  if (!str) return null;
  if (str instanceof Date) return new Date(str.getFullYear(), str.getMonth(), str.getDate());
  const parts = String(str).split('-');
  if (parts.length !== 3) return null;
  const y = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10) - 1;
  const d = parseInt(parts[2], 10);
  return new Date(y, m, d); // constructor local, no UTC
}

// Date -> "YYYY-MM-DD" usando componentes LOCALES (no UTC)
function toLocalISO(d) {
  if (!d) return '';
  const date = d instanceof Date ? d : parseLocalDate(d);
  if (!date) return '';
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayLocal() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate());
}

function todayISO() { return toLocalISO(todayLocal()); }

function addDays(date, n) {
  const d = date instanceof Date ? new Date(date) : parseLocalDate(date);
  if (!d) return null;
  d.setDate(d.getDate() + n);
  return d;
}

function diffDays(dateA, dateB) {
  const a = dateA instanceof Date ? dateA : parseLocalDate(dateA);
  const b = dateB instanceof Date ? dateB : parseLocalDate(dateB);
  if (!a || !b) return null;
  const msPerDay = 1000 * 60 * 60 * 24;
  // Normalizar a medianoche local para evitar errores de fracción
  const aNorm = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const bNorm = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((aNorm - bNorm) / msPerDay);
}

function fmtDate(str) {
  const d = parseLocalDate(str);
  if (!d) return '';
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
}

function fmtDateShort(str) {
  const d = parseLocalDate(str);
  if (!d) return '';
  return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
}

function fmtDayName(str) {
  const d = parseLocalDate(str);
  if (!d) return '';
  return d.toLocaleDateString('es-MX', { weekday: 'long' });
}

function diaSemanaLabel(n) { return ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'][Number(n)] || ''; }

/* ============================================================
   MODELO DE DATOS
   ============================================================ */
const DEFAULT_STATE = {
  version: 3,
  cuentas: {
    debito: [], // { id, nombre, saldo, tasaAnual }
    efectivo: 0,
    apartados: []
  },
  tarjetas: [], // { id, nombre, limite, cortePasado, gastoActual, fechaCorte, fechaPago, pagoProgramado }
  categorias: ['Comida', 'Transporte', 'Educación', 'Gym', 'Suscripciones', 'Ropa', 'Salud', 'Entretenimiento', 'Ingreso', 'Otro'],
  movimientos: [],
  ingresosRecurrentes: [],
  gastosFijos: [], // Ya NO incluyen comida (comida se calcula aparte)
  gastoVariableSemanalOverride: null, // Override manual del gasto NO-comida, NO-fijo
  inventario: [], // NUEVA estructura: { id, nombre, categoria, unidad, cantidad, precio, cantidadCompraTipica, tipo, caducidad }
  consumoSemanal: [], // [{ id, inventarioId, cantidad }]
  meta: { creado: null, ultimaEdicion: null }
};

const STORAGE_KEY = 'finanz_cde_v3';

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);

    // Migrar desde v2
    const v2Raw = localStorage.getItem('finanz_cde_v2');
    if (v2Raw) {
      const v2 = JSON.parse(v2Raw);
      const migrated = JSON.parse(JSON.stringify(DEFAULT_STATE));
      Object.assign(migrated, v2);
      migrated.version = 3;
      // Migrar inventario viejo a la nueva estructura
      if (v2.inventario) {
        migrated.inventario = v2.inventario.map(i => ({
          id: i.id,
          nombre: i.nombre,
          categoria: i.tipo || 'otro',
          unidad: i.unidad || 'pieza',
          cantidad: Number(i.cantidad) || 0,
          precio: Number(i.precio) || 0,
          cantidadCompraTipica: Number(i.cantidad) || 0,
          tipo: 'almacenable',
          caducidad: i.caducidad || null
        }));
        // Si había consumoDiario, convertirlo a consumoSemanal
        migrated.consumoSemanal = v2.inventario
          .filter(i => i.consumoDiario && Number(i.consumoDiario) > 0)
          .map(i => ({
            id: 'c_' + i.id,
            inventarioId: i.id,
            cantidad: Number(i.consumoDiario) * 7
          }));
      }
      if (!migrated.consumoSemanal) migrated.consumoSemanal = [];
      if (!migrated.gastoVariableSemanalOverride && migrated.gastoEstimadoSemanalOverride !== undefined) {
        migrated.gastoVariableSemanalOverride = migrated.gastoEstimadoSemanalOverride;
        delete migrated.gastoEstimadoSemanalOverride;
      }
      return migrated;
    }

    // Migrar desde v1
    const v1Raw = localStorage.getItem('finanzas_personal_v1');
    if (v1Raw) {
      const v1 = JSON.parse(v1Raw);
      const migrated = JSON.parse(JSON.stringify(DEFAULT_STATE));
      Object.assign(migrated, v1);
      migrated.version = 3;
      if (!migrated.gastosFijos) migrated.gastosFijos = [];
      if (!migrated.consumoSemanal) migrated.consumoSemanal = [];
      migrated.cuentas.debito.forEach(c => { if (c.tasaAnual === undefined) c.tasaAnual = 0; });
      migrated.tarjetas.forEach(t => { if (t.pagoProgramado === undefined) t.pagoProgramado = null; });
      return migrated;
    }

    const s = JSON.parse(JSON.stringify(DEFAULT_STATE));
    s.meta.creado = new Date().toISOString();
    return s;
  } catch (e) {
    console.error('Error cargando estado:', e);
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}

function saveState() {
  state.meta.ultimaEdicion = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ============================================================
   FORMATEO DE DINERO
   ============================================================ */
function money(n) {
  if (n === null || n === undefined || isNaN(n)) n = 0;
  const neg = n < 0; const abs = Math.abs(n);
  return (neg ? '-' : '') + '$' + abs.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function moneyShort(n) {
  if (n === null || n === undefined || isNaN(n)) n = 0;
  const neg = n < 0; const abs = Math.abs(n);
  return (neg ? '-' : '') + '$' + abs.toLocaleString('es-MX', { maximumFractionDigits: 0 });
}

/* ============================================================
   CÁLCULOS FINANCIEROS — BASE
   ============================================================ */
function totalDebito() { return state.cuentas.debito.reduce((a, c) => a + (Number(c.saldo) || 0), 0); }
function totalDeudaCortePasado() { return state.tarjetas.reduce((a, t) => a + (Number(t.cortePasado) || 0), 0); }
function totalGastoCorteActual() { return state.tarjetas.reduce((a, t) => a + (Number(t.gastoActual) || 0), 0); }
function totalApartados() { return state.cuentas.apartados.reduce((a, ap) => a + (Number(ap.monto) || 0), 0); }
function saldoVisible() { return totalDebito() + (Number(state.cuentas.efectivo) || 0); }
function dineroComprometido() { return totalDeudaCortePasado() + totalGastoCorteActual() + totalApartados(); }
function dineroLibreReal() { return saldoVisible() - dineroComprometido(); }

function rendimientoDiario() {
  return state.cuentas.debito.reduce((a, c) => {
    const tasa = Number(c.tasaAnual) || 0;
    return a + (Number(c.saldo) * (tasa / 100) / 365);
  }, 0);
}
function rendimientoMensual() { return rendimientoDiario() * 30; }
function rendimientoAnual() { return rendimientoDiario() * 365; }
function rendimientoSemanal() { return rendimientoDiario() * 7; }

function gastosDelMes() {
  const now = todayLocal();
  const ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  return state.movimientos
    .filter(m => m.fecha && m.fecha.startsWith(ym) && m.tipo === 'gasto')
    .reduce((a, m) => a + Number(m.monto || 0), 0);
}

function gastoPorCategoriaMes() {
  const now = todayLocal();
  const ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  const mapa = {};
  state.movimientos
    .filter(m => m.fecha && m.fecha.startsWith(ym) && m.tipo === 'gasto')
    .forEach(m => {
      const cat = m.categoria || 'Sin categoría';
      mapa[cat] = (mapa[cat] || 0) + Number(m.monto);
    });
  return Object.entries(mapa).sort((a, b) => b[1] - a[1]);
}

/* ============================================================
   GASTOS FIJOS (SIN COMIDA)
   ============================================================ */
function gastosFijosSemanal() {
  return state.gastosFijos.reduce((a, g) => {
    const m = Number(g.monto || 0);
    if (g.frecuencia === 'semanal') return a + m;
    if (g.frecuencia === 'quincenal') return a + m / 2;
    if (g.frecuencia === 'mensual') return a + m * 12 / 52;
    return a;
  }, 0);
}

function gastosFijosMensual() {
  return state.gastosFijos.reduce((a, g) => {
    const m = Number(g.monto || 0);
    if (g.frecuencia === 'semanal') return a + m * 52 / 12;
    if (g.frecuencia === 'quincenal') return a + m * 2;
    if (g.frecuencia === 'mensual') return a + m;
    return a;
  }, 0);
}

// Retorna los gastos fijos que caen en un rango de fechas [inicioDate, finDate]
// Para fijos mensuales con diaCobro: compara el día del mes
// Para fijos sin diaCobro: se distribuyen uniformemente (no aparecen en semanas específicas)
function gastosFijosEnRango(inicioDate, finDate) {
  const resultado = [];
  const inicio = inicioDate instanceof Date ? inicioDate : parseLocalDate(inicioDate);
  const fin = finDate instanceof Date ? finDate : parseLocalDate(finDate);

  for (const g of state.gastosFijos) {
    const diaCobro = Number(g.diaCobro) || 0;
    if (!diaCobro) continue; // sin día de cobro → distribución uniforme, no se ubica

    const monto = Number(g.monto || 0);
    if (g.frecuencia === 'mensual') {
      // Buscar si el día de cobro cae dentro del rango
      // Puede caer en el mes del inicio o del fin
      const mesesARevisar = new Set();
      let cur = new Date(inicio.getFullYear(), inicio.getMonth(), 1);
      const finMes = new Date(fin.getFullYear(), fin.getMonth(), 1);
      while (cur <= finMes) {
        mesesARevisar.add(cur.getFullYear() + '-' + cur.getMonth());
        cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
      }
      for (const ym of mesesARevisar) {
        const [y, m] = ym.split('-').map(Number);
        const ultimoDia = new Date(y, m + 1, 0).getDate();
        const diaReal = Math.min(diaCobro, ultimoDia);
        const fechaCobro = new Date(y, m, diaReal);
        if (fechaCobro >= inicio && fechaCobro <= fin) {
          resultado.push({ gasto: g, fecha: toLocalISO(fechaCobro), monto });
        }
      }
    } else if (g.frecuencia === 'quincenal') {
      // días 1 y 16 (o el diaCobro como primera quincena, segunda = diaCobro + 15)
      const diasQ = [diaCobro, diaCobro + 15 > 28 ? 16 : diaCobro + 15];
      const mesesARevisar = new Set();
      let cur = new Date(inicio.getFullYear(), inicio.getMonth(), 1);
      const finMes = new Date(fin.getFullYear(), fin.getMonth(), 1);
      while (cur <= finMes) {
        mesesARevisar.add(cur.getFullYear() + '-' + cur.getMonth());
        cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
      }
      for (const ym of mesesARevisar) {
        const [y, m] = ym.split('-').map(Number);
        for (const d of diasQ) {
          const fechaCobro = new Date(y, m, d);
          if (fechaCobro >= inicio && fechaCobro <= fin) {
            resultado.push({ gasto: g, fecha: toLocalISO(fechaCobro), monto });
          }
        }
      }
    } else if (g.frecuencia === 'semanal') {
      // Cada semana en el rango
      let cur = new Date(inicio);
      while (cur <= fin) {
        resultado.push({ gasto: g, fecha: toLocalISO(cur), monto });
        cur = addDays(cur, 7);
      }
    }
  }
  resultado.sort((a, b) => a.fecha.localeCompare(b.fecha));
  return resultado;
}

// Gastos fijos que caen en los próximos `dias` días (para alertas y dashboard)
function gastosFijosProximos(dias = 7) {
  const hoy = todayLocal();
  const fin = addDays(hoy, dias);
  return gastosFijosEnRango(hoy, fin);
}

// Suma de gastos fijos con diaCobro en una semana específica
// + distribución uniforme de los que NO tienen diaCobro
function gastosFijosEnSemana(inicioDate, finDate) {
  // Los que tienen diaCobro: sumar exactos
  const conDia = gastosFijosEnRango(inicioDate, finDate)
    .reduce((a, e) => a + e.monto, 0);

  // Los que NO tienen diaCobro: distribución uniforme semanal
  const sinDia = state.gastosFijos.reduce((a, g) => {
    if (Number(g.diaCobro) > 0) return a; // ya contados arriba
    const m = Number(g.monto || 0);
    if (g.frecuencia === 'semanal') return a + m;
    if (g.frecuencia === 'quincenal') return a + m / 2;
    if (g.frecuencia === 'mensual') return a + m * 12 / 52;
    return a;
  }, 0);

  return conDia + sinDia;
}

/* ============================================================
   MOTOR DE PLANEACIÓN DE COMIDA
   ============================================================
   Reglas de semanas:
   - Las semanas son de LUNES a DOMINGO (JS: getDay() 1=lun, 0=dom).
   - Para el plan mensual, las semanas se cortan al último día del mes.
   - La semana actual empieza el lunes anterior (o hoy si es lunes).
   - planComprasMes() → solo semanas dentro del mes actual.
   - planCompras(n) → n semanas corridas desde hoy (para proyección futura).
   ============================================================ */

function getItemInventario(invId) {
  return state.inventario.find(i => i.id === invId);
}

// Para cada item con consumo semanal, cuántos DÍAS alcanza con lo que hay
function diasQueAlcanza(invItem, consumoSem) {
  if (!consumoSem || consumoSem <= 0) return Infinity;
  return Math.floor(Number(invItem.cantidad || 0) / Number(consumoSem) * 7);
}

// Alias para compatibilidad interna
function semanasQueAlcanza(invItem, consumoSem) {
  if (!consumoSem || consumoSem <= 0) return Infinity;
  return Number(invItem.cantidad || 0) / Number(consumoSem);
}

// Obtener el lunes de la semana a la que pertenece una fecha
function lunesDe(fecha) {
  const d = fecha instanceof Date ? new Date(fecha.getFullYear(), fecha.getMonth(), fecha.getDate()) : parseLocalDate(fecha);
  const dia = d.getDay(); // 0=dom, 1=lun ... 6=sab
  const diff = (dia === 0) ? -6 : 1 - dia; // retroceder hasta el lunes
  return addDays(d, diff);
}

// Último día del mes de una fecha dada
function ultimoDiaMes(fecha) {
  const d = fecha instanceof Date ? fecha : parseLocalDate(fecha);
  return new Date(d.getFullYear(), d.getMonth() + 1, 0); // día 0 del mes siguiente = último del actual
}

// Generar bloques lunes-domingo del mes actual, cortados al fin del mes
// Devuelve: [{ inicio: Date, fin: Date }]  (fin puede ser < domingo si se corta al fin de mes)
function semanasDelMesActual() {
  const hoy = todayLocal();
  const finMes = ultimoDiaMes(hoy);
  const semanas = [];

  // Empezar desde el lunes de la semana actual
  let inicioSem = lunesDe(hoy);

  while (inicioSem <= finMes) {
    const finSem = addDays(inicioSem, 6); // domingo natural
    const finReal = finSem <= finMes ? finSem : finMes; // cortar al fin del mes
    semanas.push({ inicio: new Date(inicioSem), fin: new Date(finReal) });
    inicioSem = addDays(inicioSem, 7); // siguiente lunes
  }

  return semanas;
}

// Motor de simulación de inventario para un array de bloques { inicio, fin }
// Devuelve: [{ semana, inicio, fin, items, costoTotal }]
function _simularPlanPorBloques(bloques) {
  // Inicializar inventario simulado
  const invSim = state.inventario.map(i => ({ ...i, cantidad: Number(i.cantidad) || 0 }));
  const consumoMap = {};
  for (const c of state.consumoSemanal) consumoMap[c.inventarioId] = Number(c.cantidad) || 0;

  return bloques.map((bloque, idx) => {
    const compras = [];
    let costoTotal = 0;

    for (const inv of invSim) {
      const consumo = consumoMap[inv.id] || 0;
      if (consumo <= 0) continue;

      // Calcular consumo proporcional si la semana es parcial (< 7 días)
      const diasBloque = diffDays(bloque.fin, bloque.inicio) + 1;
      const consumoParcial = diasBloque < 7 ? consumo * diasBloque / 7 : consumo;

      if (inv.cantidad < consumoParcial) {
        const cantidadTipica = Number(inv.cantidadCompraTipica) || consumo;
        const faltante = consumoParcial - inv.cantidad;
        const unidades = Math.max(1, Math.ceil(faltante / cantidadTipica));
        const comprado = unidades * cantidadTipica;
        const costo = unidades * Number(inv.precio || 0);
        compras.push({ invItem: inv, cantidad: comprado, unidades, costo, diasBloque });
        costoTotal += costo;
        inv.cantidad += comprado;
      }

      inv.cantidad = Math.max(0, inv.cantidad - consumoParcial);
    }

    return {
      semana: idx + 1,
      inicio: toLocalISO(bloque.inicio),
      fin: toLocalISO(bloque.fin),
      items: compras,
      costoTotal
    };
  });
}

// Plan de comida para el MES ACTUAL (semanas lun-dom, cortadas al 30/31 del mes)
function planComprasMes() {
  const bloques = semanasDelMesActual();
  return _simularPlanPorBloques(bloques);
}

// Plan de compras para N semanas corridas desde hoy (para proyección futura)
// Mantiene la misma interfaz de antes para no romper proyectarSemanas()
function planCompras(numSemanas = 4) {
  const hoy = todayLocal();
  const bloques = [];
  for (let s = 0; s < numSemanas; s++) {
    const inicio = addDays(hoy, s * 7);
    const fin = addDays(inicio, 6);
    bloques.push({ inicio, fin });
  }
  return _simularPlanPorBloques(bloques);
}

// Costo estimado de comida esta semana (primera semana del plan mensual)
// Útil para saber si hay compra puntual esta semana
function costoComidaSemanaActual() {
  const plan = planComprasMes();
  return plan[0] ? plan[0].costoTotal : 0;
}

// Costo estimado de comida este mes (solo semanas dentro del mes actual)
function costoComidaMensual() {
  const plan = planComprasMes();
  return plan.reduce((a, s) => a + s.costoTotal, 0);
}

// Costo promedio de comida por semana = mensual ÷ semanas del mes
// ESTE es el número correcto para el simulador de proyección y el gasto semanal estimado.
// Ejemplo: si el mes tiene 3 semanas restantes y el plan de compras suma $650,
// el promedio semanal es $216.67, no $0 (que pasaría si esta semana no hay compra).
function costoComidaSemanalPromedio() {
  const plan = planComprasMes();
  const numSem = plan.length || 1;
  return costoComidaMensual() / numSem;
}

// Gasto total estimado semanal (usa promedio, no compra puntual de esta semana)
function gastoEstimadoSemanalTotal() {
  const override = state.gastoVariableSemanalOverride;
  const variable = (override !== null && override !== undefined) ? Number(override) : 0;
  return gastosFijosSemanal() + costoComidaSemanalPromedio() + variable;
}

// Gasto total estimado mensual (usa semanas reales del mes, no × 4)
function gastoEstimadoMensualTotal() {
  const override = state.gastoVariableSemanalOverride;
  const planMes = planComprasMes();
  const numSemMes = planMes.length || 1;
  const variable = (override !== null && override !== undefined) ? Number(override) * numSemMes : 0;
  return gastosFijosMensual() + costoComidaMensual() + variable;
}

/* ============================================================
   EVENTOS PROYECTADOS
   ============================================================ */
function proyectarEventos(dias = 30) {
  const eventos = [];
  const hoy = todayLocal();

  // Ingresos recurrentes
  for (const ing of state.ingresosRecurrentes) {
    for (let d = 0; d <= dias; d++) {
      const fecha = addDays(hoy, d);
      let aplica = false;
      if (ing.frecuencia === 'semanal' && fecha.getDay() === Number(ing.diaSemana)) aplica = true;
      if (ing.frecuencia === 'quincenal' && (fecha.getDate() === 1 || fecha.getDate() === 15)) aplica = true;
      if (ing.frecuencia === 'mensual' && fecha.getDate() === Number(ing.diaMes || 1)) aplica = true;
      if (aplica) eventos.push({ fecha: toLocalISO(fecha), tipo: 'ingreso', nombre: ing.nombre, monto: Number(ing.monto) });
    }
  }

  // Pagos programados o recurrentes de tarjetas
  for (const t of state.tarjetas) {
    if (t.pagoProgramado && t.pagoProgramado.fecha) {
      const f = parseLocalDate(t.pagoProgramado.fecha);
      const diff = diffDays(f, hoy);
      if (diff >= 0 && diff <= dias) {
        eventos.push({
          fecha: t.pagoProgramado.fecha,
          tipo: 'pago_programado',
          nombre: 'Pago programado ' + t.nombre,
          monto: Number(t.pagoProgramado.monto || t.cortePasado || 0),
          tarjetaId: t.id
        });
      }
    } else if (t.fechaPago && Number(t.cortePasado) > 0) {
      for (let d = 0; d <= dias; d++) {
        const fecha = addDays(hoy, d);
        if (fecha.getDate() === Number(t.fechaPago)) {
          eventos.push({
            fecha: toLocalISO(fecha),
            tipo: 'pago_tarjeta',
            nombre: 'Pago ' + t.nombre,
            monto: Number(t.cortePasado),
            tarjetaId: t.id
          });
          break;
        }
      }
    }
  }

  eventos.sort((a, b) => a.fecha.localeCompare(b.fecha));
  return eventos;
}

function diasHastaCorte(tarjeta) {
  if (!tarjeta.fechaCorte) return null;
  const hoy = todayLocal();
  let fecha = new Date(hoy.getFullYear(), hoy.getMonth(), Number(tarjeta.fechaCorte));
  if (fecha < hoy) fecha = new Date(hoy.getFullYear(), hoy.getMonth() + 1, Number(tarjeta.fechaCorte));
  return diffDays(fecha, hoy);
}

function diasDesdeUltimoCorte(tarjeta) {
  if (!tarjeta.fechaCorte) return null;
  const hoy = todayLocal();
  let fecha = new Date(hoy.getFullYear(), hoy.getMonth(), Number(tarjeta.fechaCorte));
  if (fecha > hoy) fecha = new Date(hoy.getFullYear(), hoy.getMonth() - 1, Number(tarjeta.fechaCorte));
  return diffDays(hoy, fecha);
}

function proyeccionCorteActual(tarjeta) {
  const diasPasados = diasDesdeUltimoCorte(tarjeta);
  const diasFaltantes = diasHastaCorte(tarjeta);
  if (!diasPasados || diasPasados === 0) return null;
  const ritmo = Number(tarjeta.gastoActual) / diasPasados;
  const proyectado = Number(tarjeta.gastoActual) + (ritmo * diasFaltantes);
  return { ritmo, proyectado, diasPasados, diasFaltantes };
}

/* ============================================================
   GRÁFICAS SVG
   ============================================================ */
function svgDonut(data, size = 160) {
  const total = data.reduce((a, d) => a + d.value, 0);
  if (total === 0) return '<div class="empty">Sin datos</div>';
  const cx = size / 2, cy = size / 2, r = size / 2 - 10, innerR = r * 0.6;
  const colors = ['#d4a574', '#8fb573', '#7aa5c4', '#a48fc4', '#d48170', '#d9c27a', '#7ac4a5', '#c47a9c'];
  let acumulado = 0;
  const paths = data.map((d, i) => {
    const inicio = (acumulado / total) * 2 * Math.PI - Math.PI / 2;
    acumulado += d.value;
    const fin = (acumulado / total) * 2 * Math.PI - Math.PI / 2;
    const largeArc = d.value / total > 0.5 ? 1 : 0;
    const x1 = cx + r * Math.cos(inicio), y1 = cy + r * Math.sin(inicio);
    const x2 = cx + r * Math.cos(fin), y2 = cy + r * Math.sin(fin);
    const x3 = cx + innerR * Math.cos(fin), y3 = cy + innerR * Math.sin(fin);
    const x4 = cx + innerR * Math.cos(inicio), y4 = cy + innerR * Math.sin(inicio);
    return `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} L ${x3} ${y3} A ${innerR} ${innerR} 0 ${largeArc} 0 ${x4} ${y4} Z" fill="${colors[i % colors.length]}" opacity="0.85"/>`;
  }).join('');
  const leyenda = data.map((d, i) => `
    <div class="row" style="font-size:12px;justify-content:space-between">
      <span class="row" style="gap:8px">
        <span style="width:10px;height:10px;background:${colors[i % colors.length]};border-radius:2px;display:inline-block"></span>
        ${escapeHtml(d.label)}
      </span>
      <span class="mono" style="color:var(--text-dim)">${money(d.value)}</span>
    </div>
  `).join('');
  return `
    <div class="row" style="gap:var(--space-lg);align-items:center">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        ${paths}
        <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-family="var(--font-mono)" style="text-transform:uppercase;letter-spacing:0.08em">Total</text>
        <text x="${cx}" y="${cy + 12}" text-anchor="middle" fill="var(--text)" font-size="13" font-family="var(--font-mono)" font-weight="600">${moneyShort(total)}</text>
      </svg>
      <div class="stack-sm" style="flex:1">${leyenda}</div>
    </div>
  `;
}

function svgLinea(data, opts = {}) {
  const w = opts.width || 600, h = opts.height || 200;
  const padX = 40, padY = 30;
  if (!data.length) return '<div class="empty">Sin datos</div>';
  const values = data.map(d => d.value);
  const max = Math.max(...values);
  const min = Math.min(...values, 0);
  const rango = max - min || 1;
  const step = (w - padX * 2) / Math.max(1, data.length - 1);
  const points = data.map((d, i) => {
    const x = padX + step * i;
    const y = padY + (h - padY * 2) - ((d.value - min) / rango) * (h - padY * 2);
    return { x, y, d };
  });
  const path = points.map((p, i) => (i === 0 ? 'M' : 'L') + ' ' + p.x + ' ' + p.y).join(' ');
  const areaPath = path + ` L ${points[points.length - 1].x} ${h - padY} L ${points[0].x} ${h - padY} Z`;
  const dots = points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--accent)"/>`).join('');
  const labels = points.map(p => `
    <text x="${p.x}" y="${p.y - 10}" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-family="var(--font-mono)">${moneyShort(p.d.value)}</text>
    <text x="${p.x}" y="${h - padY + 16}" text-anchor="middle" fill="var(--text-faint)" font-size="10">${escapeHtml(p.d.label)}</text>
  `).join('');
  const yZero = padY + (h - padY * 2) - ((0 - min) / rango) * (h - padY * 2);
  const ceroLine = `<line x1="${padX}" y1="${yZero}" x2="${w - padX}" y2="${yZero}" stroke="var(--border)" stroke-dasharray="3,3"/>`;
  return `
    <svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
      ${ceroLine}
      <path d="${areaPath}" fill="var(--accent)" opacity="0.08"/>
      <path d="${path}" stroke="var(--accent)" stroke-width="2" fill="none"/>
      ${dots}${labels}
    </svg>
  `;
}

function calcularAlertas() {
  const alertas = [];
  if (dineroLibreReal() < 0) alertas.push({ tipo: 'danger', txt: 'Tu dinero libre real es negativo.' });
  state.tarjetas.forEach(t => {
    const util = (Number(t.gastoActual) / (Number(t.limite) || 1)) * 100;
    if (util > 80) alertas.push({ tipo: 'warn', txt: `${t.nombre}: utilización del ${util.toFixed(0)}%.` });
    if (t.pagoProgramado && t.pagoProgramado.fecha) {
      const diff = diffDays(parseLocalDate(t.pagoProgramado.fecha), todayLocal());
      if (diff >= 0 && diff <= 3) alertas.push({ tipo: 'warn', txt: `${t.nombre}: pago programado en ${diff} día(s) por ${money(t.pagoProgramado.monto)}.` });
    }
  });

  // Alertas de gastos fijos próximos (con diaCobro definido)
  const proxFijos3 = gastosFijosProximos(3);
  if (proxFijos3.length > 0) {
    const totalProx = proxFijos3.reduce((a, e) => a + e.monto, 0);
    const lista = proxFijos3.map(e => `${e.gasto.nombre} (${fmtDateShort(e.fecha)})`).join(', ');
    alertas.push({ tipo: 'warn', txt: `Gastos fijos en los próximos 3 días: ${money(totalProx)} — ${lista}` });
  }
  const proxFijos7 = gastosFijosProximos(7).filter(e => diffDays(parseLocalDate(e.fecha), todayLocal()) > 3);
  if (proxFijos7.length > 0) {
    const totalSem = proxFijos7.reduce((a, e) => a + e.monto, 0);
    alertas.push({ tipo: 'info', txt: `Esta semana: ${money(totalSem)} en gastos fijos programados (${proxFijos7.map(e => e.gasto.nombre).join(', ')}).` });
  }

  // Alertas de inventario usando consumo semanal
  const consumoMap = {};
  for (const c of state.consumoSemanal) consumoMap[c.inventarioId] = Number(c.cantidad) || 0;
  state.inventario.forEach(i => {
    const c = consumoMap[i.id];
    if (c > 0) {
      const semanasAlc = semanasQueAlcanza(i, c);
      if (semanasAlc < 1) alertas.push({ tipo: 'info', txt: `${i.nombre}: no alcanza para la semana (te falta comprar).` });
    }
  });
  return alertas;
}

function tipoMovimientoLabel(tipo) {
  const map = {
    gasto: '<span class="tag negative">Gasto</span>',
    ingreso: '<span class="tag positive">Ingreso</span>',
    pago_tarjeta: '<span class="tag info">Pago TC</span>',
    ajuste: '<span class="tag">Ajuste</span>',
    transferencia: '<span class="tag">Transf.</span>'
  };
  return map[tipo] || tipo;
}

function nombreCuenta(m) {
  if (m.afecta === 'efectivo') return 'Efectivo';
  if (m.afecta === 'credito') {
    const t = state.tarjetas.find(x => x.id === m.cuentaId);
    return t ? t.nombre : 'Tarjeta';
  }
  const c = state.cuentas.debito.find(x => x.id === m.cuentaId);
  return c ? c.nombre : 'Débito';
}

window.eliminarMovimiento = function(id) {
  if (!confirm('¿Eliminar este movimiento?')) return;
  const mov = state.movimientos.find(m => m.id === id);
  if (mov) revertirEfectoMovimiento(mov);
  state.movimientos = state.movimientos.filter(m => m.id !== id);
  saveState();
  render();
};

window.guardarMovimiento = function(ev) {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const tipo = f.get('tipo');
  const mov = {
    id: uid(),
    fecha: f.get('fecha'), // YA es formato YYYY-MM-DD en hora local
    tipo,
    concepto: f.get('concepto'),
    monto: Number(f.get('monto')),
    categoria: f.get('categoria'),
    afecta: f.get('afecta'),
    cuentaId: f.get('cuentaId') || null,
    corte: f.get('afecta') === 'credito' ? f.get('corte') : null,
    observaciones: f.get('observaciones'),
    tarjetaPagoId: tipo === 'pago_tarjeta' ? f.get('tarjetaPagoId') : null
  };
  state.movimientos.push(mov);
  aplicarEfectoMovimiento(mov);
  saveState();
  closeModal();
  render();
};

function aplicarEfectoMovimiento(m) {
  const monto = Number(m.monto);
  if (m.tipo === 'gasto') {
    if (m.afecta === 'debito') {
      const c = state.cuentas.debito.find(x => x.id === m.cuentaId);
      if (c) c.saldo = Number(c.saldo) - monto;
    } else if (m.afecta === 'efectivo') {
      state.cuentas.efectivo = Number(state.cuentas.efectivo) - monto;
    } else if (m.afecta === 'credito') {
      const t = state.tarjetas.find(x => x.id === m.cuentaId);
      if (t) {
        if (m.corte === 'pasado') t.cortePasado = Number(t.cortePasado) + monto;
        else t.gastoActual = Number(t.gastoActual) + monto;
      }
    }
  } else if (m.tipo === 'ingreso') {
    if (m.afecta === 'debito') {
      const c = state.cuentas.debito.find(x => x.id === m.cuentaId);
      if (c) c.saldo = Number(c.saldo) + monto;
    } else if (m.afecta === 'efectivo') {
      state.cuentas.efectivo = Number(state.cuentas.efectivo) + monto;
    }
  } else if (m.tipo === 'pago_tarjeta') {
    if (m.afecta === 'debito') {
      const c = state.cuentas.debito.find(x => x.id === m.cuentaId);
      if (c) c.saldo = Number(c.saldo) - monto;
    } else if (m.afecta === 'efectivo') {
      state.cuentas.efectivo = Number(state.cuentas.efectivo) - monto;
    }
    if (m.tarjetaPagoId) {
      const t = state.tarjetas.find(x => x.id === m.tarjetaPagoId);
      if (t) {
        t.cortePasado = Math.max(0, Number(t.cortePasado) - monto);
        if (t.pagoProgramado) t.pagoProgramado = null;
      }
    }
  }
}

function revertirEfectoMovimiento(m) {
  if (m.tipo === 'gasto') aplicarEfectoMovimiento({ ...m, tipo: 'ingreso' });
  else if (m.tipo === 'ingreso') aplicarEfectoMovimiento({ ...m, tipo: 'gasto' });
  else if (m.tipo === 'pago_tarjeta') {
    const monto = Number(m.monto);
    if (m.afecta === 'debito') {
      const c = state.cuentas.debito.find(x => x.id === m.cuentaId);
      if (c) c.saldo = Number(c.saldo) + monto;
    } else if (m.afecta === 'efectivo') {
      state.cuentas.efectivo = Number(state.cuentas.efectivo) + monto;
    }
    if (m.tarjetaPagoId) {
      const t = state.tarjetas.find(x => x.id === m.tarjetaPagoId);
      if (t) t.cortePasado = Number(t.cortePasado) + monto;
    }
  }
}

pages.flujo = function() {

function proyectarSemanas(numSemanas) {
  const resultado = [];
  const hoy = todayLocal();
  let saldo = saldoVisible();
  const rendSem = rendimientoSemanal();
  const plan = planCompras(numSemanas);
  const fijoSem = gastosFijosSemanal();
  const override = state.gastoVariableSemanalOverride;
  const variable = (override !== null && override !== undefined) ? Number(override) : 0;

  for (let s = 0; s < numSemanas; s++) {
    const inicio = addDays(hoy, s * 7);
    const fin = addDays(inicio, 6);
    let ingresos = 0, pagos = 0;

    for (let d = 0; d < 7; d++) {
      const dia = addDays(inicio, d);
      for (const ing of state.ingresosRecurrentes) {
        let aplica = false;
        if (ing.frecuencia === 'semanal' && dia.getDay() === Number(ing.diaSemana)) aplica = true;
        if (ing.frecuencia === 'quincenal' && (dia.getDate() === 1 || dia.getDate() === 15)) aplica = true;
        if (ing.frecuencia === 'mensual' && dia.getDate() === Number(ing.diaMes || 1)) aplica = true;
        if (aplica) ingresos += Number(ing.monto);
      }
      for (const t of state.tarjetas) {
        const diaISO = toLocalISO(dia);
        if (t.pagoProgramado && t.pagoProgramado.fecha === diaISO) {
          pagos += Number(t.pagoProgramado.monto);
        } else if (!t.pagoProgramado && Number(t.cortePasado) > 0 && dia.getDate() === Number(t.fechaPago) && s === 0) {
          pagos += Number(t.cortePasado);
        }
      }
    }

    const comidaSem = plan[s] ? plan[s].costoTotal : 0;
    const gastoSem = fijoSem + comidaSem + variable;
    const delta = ingresos + rendSem - pagos - gastoSem;
    saldo += delta;
    resultado.push({
      inicio: toLocalISO(inicio), fin: toLocalISO(fin),
      ingresos, pagos, gasto: gastoSem, rendimiento: rendSem, delta, saldoFinal: saldo,
      comida: comidaSem, fijos: fijoSem, variable
    });
  }
  return resultado;
}

window.guardarInventario = function(ev, id) {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const data = {
    nombre: f.get('nombre'),
    categoria: f.get('categoria'),
    unidad: f.get('unidad'),
    cantidad: Number(f.get('cantidad')),
    tipo: f.get('tipo'),
    cantidadCompraTipica: Number(f.get('cantidadCompraTipica')) || 0,
    precio: Number(f.get('precio')) || 0,
    caducidad: f.get('caducidad') || null
  };
  if (id) Object.assign(state.inventario.find(z => z.id === id), data);
  else state.inventario.push({ id: uid(), ...data });
  saveState(); closeModal(); render();
};

window.eliminarInventario = function(id) {
  if (!confirm('¿Eliminar alimento? También se eliminará su consumo semanal.')) return;
  state.inventario = state.inventario.filter(i => i.id !== id);
  state.consumoSemanal = state.consumoSemanal.filter(c => c.inventarioId !== id);
  saveState(); render();
};

/* ============================================================
   PÁGINA: CONSUMO SEMANAL
   ============================================================ */
pages.consumo = function() {
  const consumoMap = {};
  for (const c of state.consumoSemanal) consumoMap[c.inventarioId] = c;

  // Items de inventario sin consumo asignado
  const sinConsumo = state.inventario.filter(i => !consumoMap[i.id]);

  return `
    <div class="page-header">
      <div>
        <div class="page-title">Consumo semanal</div>
        <div class="page-subtitle">Cuánto consumes de cada alimento por semana</div>
        <div class="accent-rule"></div>
      </div>
      ${sinConsumo.length > 0 ? `<button onclick="modalConsumo()" class="primary">+ Agregar consumo</button>` : ''}
    </div>

    ${state.inventario.length === 0 ? `
      <div class="alert info">Primero agrega alimentos en la sección "Inventario".</div>
    ` : state.consumoSemanal.length === 0 ? `
      <div class="card"><div class="empty">Aún no has definido tu consumo semanal. Haz clic en "Agregar consumo" para empezar.</div></div>
    ` : `
      <div class="card">
        <div class="card-title">Mi consumo por semana</div>
        <table>
          <thead>
            <tr>
              <th>Alimento</th><th>Categoría</th>
              <th class="num">Consumo/sem</th><th>Unidad</th>
              <th class="num">Hay ahora</th><th class="num">Días alcanza</th>
              <th class="num">Costo/sem estimado</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
          ${state.consumoSemanal.map(c => {
            const inv = getItemInventario(c.inventarioId);
            if (!inv) return '';
            const diasAlc = c.cantidad > 0 ? diasQueAlcanza(inv, Number(c.cantidad)) : null;
            // Costo semanal = (consumo / cantidadCompraTipica) * precio
            const costo = inv.cantidadCompraTipica > 0
              ? (Number(c.cantidad) / Number(inv.cantidadCompraTipica)) * Number(inv.precio || 0)
              : 0;
            return `
              <tr>
                <td><strong>${escapeHtml(inv.nombre)}</strong></td>
                <td><span class="tag">${escapeHtml(inv.categoria)}</span></td>
                <td class="num mono">${c.cantidad}</td>
                <td style="color:var(--text-dim)">${escapeHtml(inv.unidad)}</td>
                <td class="num mono">${inv.cantidad}</td>
                <td class="num">${diasAlc === null ? '—' : diasAlc < 7 ? `<span class="tag negative">${diasAlc}d</span>` : `<span style="color:var(--positive)">${diasAlc}d</span>`}</td>
                <td class="num mono">${money(costo)}</td>
                <td>
                  <button class="sm" onclick="modalConsumo('${c.inventarioId}')">Editar</button>
                  <button class="sm ghost danger" onclick="eliminarConsumo('${c.id}')">×</button>
                </td>
              </tr>
            `;
          }).join('')}
          </tbody>
        </table>
        <div class="divider"></div>
        <div class="row-between" style="font-size:13px">
          <span style="color:var(--text-dim)">Costo semanal total de consumo (si se comprara todo junto)</span>
          <span class="mono"><strong>${money(costoConsumoSemanalTotal())}</strong></span>
        </div>
      </div>

      ${sinConsumo.length > 0 ? `
        <div class="card" style="margin-top:var(--space-md)">
          <div class="card-title">Alimentos sin consumo asignado</div>
          <div class="stack-sm">
            ${sinConsumo.map(i => `
              <div class="row-between" style="padding:6px 10px;background:var(--bg-elev-2);border-radius:var(--radius)">
                <span>${escapeHtml(i.nombre)} <span class="tag">${escapeHtml(i.categoria)}</span></span>
                <button class="sm" onclick="modalConsumo('${i.id}')">Definir consumo</button>
              </div>
            `).join('')}
          </div>
        </div>
      ` : ''}
    `}
  `;
};

function costoConsumoSemanalTotal() {
  let total = 0;
  for (const c of state.consumoSemanal) {
    const inv = getItemInventario(c.inventarioId);
    if (!inv || !inv.cantidadCompraTipica || inv.cantidadCompraTipica <= 0) continue;
    total += (Number(c.cantidad) / Number(inv.cantidadCompraTipica)) * Number(inv.precio || 0);
  }
  return total;
}

window.modalConsumo = function(inventarioId) {
  const existente = inventarioId ? state.consumoSemanal.find(c => c.inventarioId === inventarioId) : null;

  let itemsHtml;
  if (inventarioId) {
    const inv = getItemInventario(inventarioId);
    itemsHtml = `<input type="hidden" name="inventarioId" value="${inventarioId}">
                 <div class="form-row"><label>Alimento</label><input type="text" value="${escapeHtml(inv ? inv.nombre : '')}" disabled></div>`;
  } else {
    const consumoIds = state.consumoSemanal.map(c => c.inventarioId);
    const opts = state.inventario
      .filter(i => !consumoIds.includes(i.id))
      .map(i => `<option value="${i.id}">${escapeHtml(i.nombre)} (${escapeHtml(i.unidad)})</option>`).join('');
    itemsHtml = `<div class="form-row">
      <label>Alimento</label>
      <select name="inventarioId" required>${opts || '<option value="">— Sin alimentos disponibles —</option>'}</select>
    </div>`;
  }

  openModal(`
    <div class="modal-title">${existente ? 'Editar' : 'Agregar'} consumo semanal</div>
    <form onsubmit="guardarConsumo(event, '${existente ? existente.id : ''}')">
      ${itemsHtml}
      <div class="form-row">
        <label>Cantidad por semana</label>
        <input type="number" step="0.01" min="0" name="cantidad" value="${existente ? existente.cantidad : ''}" required>
      </div>
      <div class="alert info">
        Ejemplos: Pollo 800 (g), Atún 15 (latas), Papa 2 (kg), Yogurt 7 (piezas).<br>
        La unidad es la que definiste en el inventario.
      </div>
      <div class="modal-actions">
        <button type="button" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </div>
    </form>
  `);
};

window.guardarConsumo = function(ev, id) {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const inventarioId = f.get('inventarioId');
  const cantidad = Number(f.get('cantidad'));
  if (!inventarioId) return;

  if (id) {
    const c = state.consumoSemanal.find(x => x.id === id);
    if (c) c.cantidad = cantidad;
  } else {
    // Verificar si ya existe para ese inventario
    const existing = state.consumoSemanal.find(c => c.inventarioId === inventarioId);
    if (existing) existing.cantidad = cantidad;
    else state.consumoSemanal.push({ id: uid(), inventarioId, cantidad });
  }
  saveState(); closeModal(); render();
};

window.eliminarConsumo = function(id) {
  state.consumoSemanal = state.consumoSemanal.filter(c => c.id !== id);
  saveState(); render();
};

window.renderSim = function() {
  const semanas = Number(document.getElementById('simSemanas').value) || 8;
  const gasto = Number(document.getElementById('simGasto').value) || 0;
  const ahorro = Number(document.getElementById('simAhorro').value) || 0;
  const pagoExtra = Number(document.getElementById('simPagoExtra').value) || 0;

  let saldo = saldoVisible();
  let ahorroAcum = 0;
  const hoy = todayLocal();
  const filas = [];
  const rendSem = rendimientoSemanal();

  for (let s = 0; s < semanas; s++) {
    const inicio = addDays(hoy, s * 7);
    const fin = addDays(inicio, 6);
    let ingresos = 0, pagos = 0;
    for (let d = 0; d < 7; d++) {
      const dia = addDays(inicio, d);
      for (const ing of state.ingresosRecurrentes) {
        let aplica = false;
        if (ing.frecuencia === 'semanal' && dia.getDay() === Number(ing.diaSemana)) aplica = true;
        if (ing.frecuencia === 'quincenal' && (dia.getDate() === 1 || dia.getDate() === 15)) aplica = true;
        if (ing.frecuencia === 'mensual' && dia.getDate() === Number(ing.diaMes || 1)) aplica = true;
        if (aplica) ingresos += Number(ing.monto);
      }
      const diaISO = toLocalISO(dia);
      for (const t of state.tarjetas) {
        if (t.pagoProgramado && t.pagoProgramado.fecha === diaISO) pagos += Number(t.pagoProgramado.monto);
        else if (!t.pagoProgramado && Number(t.cortePasado) > 0 && dia.getDate() === Number(t.fechaPago) && s === 0) pagos += Number(t.cortePasado);
      }
    }
    const pagoExtraAplica = s === 0 ? pagoExtra : 0;
    const delta = ingresos + rendSem - pagos - gasto - ahorro - pagoExtraAplica;
    saldo += delta;
    ahorroAcum += ahorro;
    filas.push({ s: s + 1, inicio, fin, ingresos, pagos, gasto, ahorro, pagoExtraAplica, rend: rendSem, delta, saldo, ahorroAcum });
  }

  const final = filas[filas.length - 1] || { saldo: saldoVisible(), ahorroAcum: 0 };

  document.getElementById('simResult').innerHTML = `
    <div class="grid grid-3" style="margin-bottom:var(--space-md)">
      <div class="card">
        <div class="stat-label">Saldo proyectado final</div>
        <div class="stat-value ${final.saldo >= 0 ? 'positive' : 'negative'}">${money(final.saldo)}</div>
      </div>
      <div class="card">
        <div class="stat-label">Ahorro acumulado</div>
        <div class="stat-value accent">${money(final.ahorroAcum)}</div>
      </div>
      <div class="card">
        <div class="stat-label">Δ total</div>
        <div class="stat-value ${(final.saldo - saldoVisible()) >= 0 ? 'positive' : 'negative'}">${money(final.saldo - saldoVisible())}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:var(--space-md)">
      <div class="card-title">Evolución del saldo</div>
      ${svgLinea(filas.map(f => ({ label: 'S' + f.s, value: f.saldo })), { width: 800, height: 200 })}
    </div>

    <table>
      <thead><tr><th>S</th><th>Rango</th><th class="num">Ingr.</th><th class="num">Rend.</th><th class="num">Pagos</th><th class="num">Gasto</th><th class="num">Ahorro</th><th class="num">Saldo</th></tr></thead>
      <tbody>
      ${filas.map(f => `
        <tr>
          <td>S${f.s}</td>
          <td style="color:var(--text-dim)">${fmtDateShort(toLocalISO(f.inicio))} — ${fmtDateShort(toLocalISO(f.fin))}</td>
          <td class="num positive">+${moneyShort(f.ingresos)}</td>
          <td class="num positive">+${moneyShort(f.rend)}</td>
          <td class="num negative">−${moneyShort(f.pagos + f.pagoExtraAplica)}</td>
          <td class="num negative">−${moneyShort(f.gasto)}</td>
          <td class="num">${moneyShort(f.ahorro)}</td>
          <td class="num ${f.saldo >= 0 ? '' : 'negative'}"><strong>${money(f.saldo)}</strong></td>
        </tr>
      `).join('')}
      </tbody>
    </table>
  `;
};

/* ============================================================
   PÁGINA: CONFIGURACIÓN
   ============================================================ */
pages.config = function() {
  return `
    <div class="page-header">
      <div>
        <div class="page-title">Configuración</div>
        <div class="page-subtitle">Cuentas, efectivo, apartados y mantenimiento</div>
        <div class="accent-rule"></div>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <div class="card-title">Cuentas de débito <button onclick="modalCuentaDebito()">+ Nueva</button></div>
        ${state.cuentas.debito.length === 0 ? '<div class="empty">Agrega tu primera cuenta</div>' :
          `<table><tbody>
            ${state.cuentas.debito.map(c => `
              <tr>
                <td>
                  <strong>${escapeHtml(c.nombre)}</strong>
                  ${c.tasaAnual > 0 ? `<br><span class="tag purple" style="margin-top:2px">Rinde ${c.tasaAnual}% anual</span>` : ''}
                </td>
                <td class="num mono">${money(c.saldo)}</td>
                <td>
                  <button class="sm" onclick="modalCuentaDebito('${c.id}')">Editar</button>
                  <button class="sm ghost danger" onclick="eliminarCuentaDebito('${c.id}')">×</button>
                </td>
              </tr>
            `).join('')}
          </tbody></table>`
        }
        ${rendimientoDiario() > 0 ? `
          <div class="divider"></div>
          <div class="stat-sub">Rendimiento total: <strong style="color:var(--positive)">${money(rendimientoDiario())}/día</strong> · ${money(rendimientoMensual())}/mes</div>
        ` : ''}
      </div>

      <div class="card">
        <div class="card-title">Efectivo</div>
        <form onsubmit="guardarEfectivo(event)" class="row" style="gap:var(--space-sm)">
          <input type="number" step="0.01" name="efectivo" value="${state.cuentas.efectivo || 0}" style="flex:1">
          <button type="submit" class="primary">Guardar</button>
        </form>
        <div class="stat-sub" style="margin-top:var(--space-sm)">Billetes y monedas físicos</div>
      </div>

      <div class="card">
        <div class="card-title">Apartados <button onclick="modalApartado()">+ Nuevo</button></div>
        <div class="card-subtitle" style="margin-bottom:var(--space-md)">Dinero que mentalmente ya no está disponible</div>
        ${state.cuentas.apartados.length === 0 ? '<div class="empty">Sin apartados</div>' :
          `<table><tbody>
            ${state.cuentas.apartados.map(a => `
              <tr>
                <td><strong>${escapeHtml(a.nombre)}</strong><br><span style="font-size:11px;color:var(--text-faint)">${escapeHtml(a.destino || '')}</span></td>
                <td class="num mono">${money(a.monto)}</td>
                <td><button class="ghost danger" onclick="eliminarApartado('${a.id}')">×</button></td>
              </tr>
            `).join('')}
          </tbody></table>`
        }
      </div>

      <div class="card">
        <div class="card-title">Categorías</div>
        <div class="stack-sm">
          ${state.categorias.map((c, idx) => `
            <div class="row-between" style="padding:6px 10px;background:var(--bg-elev-2);border-radius:var(--radius)">
              <span>${escapeHtml(c)}</span>
              <button class="ghost danger" onclick="eliminarCategoria(${idx})">×</button>
            </div>
          `).join('')}
        </div>
        <form onsubmit="agregarCategoria(event)" class="row" style="gap:var(--space-sm);margin-top:var(--space-md)">
          <input type="text" name="cat" placeholder="Nueva categoría" required style="flex:1">
          <button type="submit">Agregar</button>
        </form>
      </div>
    </div>

    <div class="card" style="margin-top:var(--space-md)">
      <div class="card-title">Mantenimiento</div>
      <div class="row" style="gap:var(--space-sm);flex-wrap:wrap">
        <button onclick="exportarDatos()">Exportar (backup)</button>
        <button onclick="document.getElementById('importFile').click()">Importar</button>
        <input type="file" id="importFile" style="display:none" accept=".json" onchange="importarDatos(event)">
        <button class="danger" onclick="resetearTodo()">Resetear todo</button>
      </div>
      <div class="stat-sub" style="margin-top:var(--space-md)">Última edición: ${state.meta.ultimaEdicion ? fmtDate(toLocalISO(new Date(state.meta.ultimaEdicion))) : '—'}</div>
    </div>
  `;
};

window.modalCuentaDebito = function(id) {
  const c = id ? state.cuentas.debito.find(x => x.id === id) : null;
  openModal(`
    <div class="modal-title">${c ? 'Editar' : 'Nueva'} cuenta de débito</div>
    <form onsubmit="guardarCuentaDebito(event, '${id || ''}')">
      <div class="form-row"><label>Nombre</label><input type="text" name="nombre" value="${c ? escapeHtml(c.nombre) : ''}" required></div>
      <div class="form-grid">
        <div class="form-row"><label>Saldo actual</label><input type="number" step="0.01" name="saldo" value="${c ? c.saldo : 0}" required></div>
        <div class="form-row">
          <label>Tasa anual % (opcional)</label>
          <input type="number" step="0.01" name="tasaAnual" value="${c ? (c.tasaAnual || 0) : 0}" placeholder="Ej. 13">
        </div>
      </div>
      <div class="alert info">Para cuentas con rendimiento (Cajita Turbo Nu = 13%), pon la tasa anual.</div>
      <div class="modal-actions">
        <button type="button" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </div>
    </form>
  `);
};

window.guardarCuentaDebito = function(ev, id) {
  ev.preventDefault();
  const f = new FormData(ev.target);
  const data = { nombre: f.get('nombre'), saldo: Number(f.get('saldo')), tasaAnual: Number(f.get('tasaAnual')) || 0 };
  if (id) Object.assign(state.cuentas.debito.find(c => c.id === id), data);
  else state.cuentas.debito.push({ id: uid(), ...data });
  saveState(); closeModal(); render();
};

window.eliminarCuentaDebito = function(id) {
  if (!confirm('¿Eliminar cuenta?')) return;
  state.cuentas.debito = state.cuentas.debito.filter(c => c.id !== id);
  saveState(); render();
};

window.guardarEfectivo = function(ev) {
  ev.preventDefault();
  state.cuentas.efectivo = Number(new FormData(ev.target).get('efectivo'));
  saveState(); render();
};

window.modalApartado = function() {
  openModal(`
    <div class="modal-title">Nuevo apartado</div>
    <form onsubmit="guardarApartado(event)">
      <div class="form-row"><label>Nombre</label><input type="text" name="nombre" required></div>
      <div class="form-row"><label>Monto</label><input type="number" step="0.01" name="monto" required></div>
      <div class="form-row"><label>Destino</label><input type="text" name="destino"></div>
      <div class="modal-actions">
        <button type="button" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="primary">Guardar</button>
      </div>
    </form>
  `);
};

window.guardarApartado = function(ev) {
  ev.preventDefault();
  const f = new FormData(ev.target);
  state.cuentas.apartados.push({ id: uid(), nombre: f.get('nombre'), monto: Number(f.get('monto')), destino: f.get('destino') });
  saveState(); closeModal(); render();
};

window.eliminarApartado = function(id) {
  state.cuentas.apartados = state.cuentas.apartados.filter(a => a.id !== id);
  saveState(); render();
};

window.agregarCategoria = function(ev) {
  ev.preventDefault();
  const cat = new FormData(ev.target).get('cat').trim();
  if (cat && !state.categorias.includes(cat)) state.categorias.push(cat);
  saveState(); render();
};

window.eliminarCategoria = function(idx) {
  state.categorias.splice(idx, 1);
  saveState(); render();
};

window.exportarDatos = function() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `finanz_cde_backup_${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
};

window.importarDatos = function(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!confirm('¿Reemplazar todos los datos?')) return;
      state = data; saveState(); render();
      alert('Datos importados.');
    } catch (err) { alert('Archivo inválido: ' + err.message); }
  };
  reader.readAsText(file);
};

window.resetearTodo = function() {
  if (!confirm('¿Borrar TODO?')) return;
  if (!confirm('Confirmación final')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState(); render();
};

/* ============================================================
   HELPERS
   ============================================================ */
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

/* ============================================================
   INICIO
   ============================================================ */
/* ============================================================
   PWA — REGISTRO DEL SERVICE WORKER
   ============================================================ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/finanz-cde/service-worker.js', { scope: '/finanz-cde/' })
      .then(reg => {
        // Escuchar actualizaciones disponibles
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Hay una versión nueva disponible
              const banner = document.createElement('div');
              banner.style.cssText = `
                position:fixed;bottom:0;left:0;right:0;z-index:9999;
                background:#16181a;border-top:1px solid #d4a574;
                padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
                font-family:'Inter Tight',sans-serif;font-size:13px;color:#e8e6e3;
              `;
              banner.innerHTML = `
                <span>✦ Nueva versión disponible</span>
                <button onclick="window.location.reload()" style="
                  background:#d4a574;color:#1a1410;border:none;border-radius:4px;
                  padding:6px 14px;font-weight:600;cursor:pointer;font-size:12px;
                ">Actualizar</button>
              `;
              document.body.appendChild(banner);
            }
          });
        });
      })
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// Prompt de instalación (Android Chrome)
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Mostrar botón de instalación en la barra de navegación si existe
  const installBtn = document.getElementById('pwaInstallBtn');
  if (installBtn) installBtn.style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const installBtn = document.getElementById('pwaInstallBtn');
  if (installBtn) installBtn.style.display = 'none';
});

window.instalarPWA = function() {
  if (!deferredInstallPrompt) {
    alert('Para instalar: usa el menú de tu navegador → "Agregar a pantalla de inicio" o "Instalar app".');
    return;
  }
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => { deferredInstallPrompt = null; });
};

saveState();
render();
</script>
</body>
